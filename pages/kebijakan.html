<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kebijakan Privasi — SehatKu</title>
  <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    .policy-content {
      max-width: 760px; margin: 0 auto;
      background: var(--clr-surface); border-radius: var(--radius-lg);
      padding: 3rem; box-shadow: var(--shadow-md); border: 1px solid var(--clr-border);
    }
    .policy-content h2 { font-family: var(--ff-display); font-size: 1.35rem; margin: 2rem 0 .75rem; color: var(--clr-primary); }
    .policy-content h2:first-child { margin-top: 0; }
    .policy-content p  { font-size: .93rem; color: var(--clr-muted); line-height: 1.75; margin-bottom: .75rem; }
    .policy-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: .75rem; }
    .policy-content ul li { font-size: .93rem; color: var(--clr-muted); margin-bottom: .35rem; }
    .toc { background: var(--clr-primary-lt); border-radius: var(--radius-md); padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
    .toc h3 { font-size: .92rem; font-weight: 700; margin-bottom: .75rem; }
    .toc ol  { padding-left: 1.25rem; }
    .toc li  { font-size: .86rem; margin-bottom: .3rem; }
    .toc a   { color: var(--clr-primary); }
    hr { border: none; border-top: 1px solid var(--clr-border); margin: 2rem 0; }
    .last-updated { font-size: .8rem; color: var(--clr-muted); background: var(--clr-bg); border-radius: var(--radius-sm); padding: .5rem .9rem; display: inline-block; margin-bottom: 1.5rem; }
  </style>
</head>
