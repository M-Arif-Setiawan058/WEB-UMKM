    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/darkmode.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,400&display=swap"
        rel="stylesheet" />
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo"><span class="logo-icon">✚</span><span class="logo-text">Sehat<span
                        class="logo-accent">Ku</span></span></a>
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html" class="nav-link">Beranda</a></li>
                <li><a href="artikel.html" class="nav-link">Artikel</a></li>
                <li><a href="penyakit.html" class="nav-link active">Ensiklopedi Penyakit</a></li>
                <li><a href="obat.html" class="nav-link">Obat & Suplemen</a></li>
                <li><a href="kalkulator.html" class="nav-link">Kalkulator</a></li>
            </ul>
            <button class="nav-cta" onclick="window.location.href='konsultasi.html'">Konsultasi Gratis</button>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Ganti tema">🌙</button>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>
    <section class="page-hero">
        <div class="container">
            <div class="section-eyebrow">Referensi Medis</div>
            <h1>Ensiklopedi Penyakit</h1>
            <p>Informasi lengkap tentang penyakit, gejala, penyebab, dan penanganannya — direview oleh dokter spesialis.
            </p>
            <div class="search-wrapper" style="max-width:500px;margin:1.5rem auto 0">
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="diseaseSearch" class="search-input" placeholder="Cari nama penyakit..."
                        oninput="filterDiseases(this.value)" />
                </div>
            </div>
        </div>
    </section>
    <section class="section">
        <div class="container">
            <div class="filters-bar" id="diseaseFilters">
                <button class="filter-pill active" onclick="filterByCategory('semua', this)">Semua</button>
                <button class="filter-pill" onclick="filterByCategory('jantung', this)">Jantung</button>
                <button class="filter-pill" onclick="filterByCategory('metabolik', this)">Metabolik</button>
                <button class="filter-pill" onclick="filterByCategory('infeksi', this)">Infeksi</button>
                <button class="filter-pill" onclick="filterByCategory('pernapasan', this)">Pernapasan</button>
                <button class="filter-pill" onclick="filterByCategory('pencernaan', this)">Pencernaan</button>
                <button class="filter-pill" onclick="filterByCategory('mental', this)">Mental</button>
                <button class="filter-pill" onclick="filterByCategory('kanker', this)">Kanker</button>
            </div>

            <div class="results-grid" id="diseaseGrid"
                style="grid-template-columns: repeat(auto-fill, minmax(280px,1fr))"></div>
        </div>
    </section>
