<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tentang Kami — SehatKu</title>
  <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    .about-hero {
      background: linear-gradient(135deg, #0f5233 0%, #1a7a4a 60%, #2a9d6a 100%);
      padding: calc(var(--nav-h) + 4rem) 0 5rem;
      text-align: center; color: #fff; position: relative; overflow: hidden;
    }
    .about-hero::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .about-hero h1 { font-family: var(--ff-display); font-size: clamp(2.2rem,4vw,3.4rem); margin-bottom: 1rem; position: relative; }
    .about-hero p  { font-size: 1.15rem; opacity: .85; max-width: 580px; margin-inline: auto; position: relative; }
    .about-hero .hero-badge { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.3); color: #fff; position: relative; }

    .mission-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
    .mission-card {
      background: var(--clr-surface); border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg); padding: 2rem;
      text-align: center; box-shadow: var(--shadow-sm);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .mission-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
    .mission-icon { font-size: 3rem; margin-bottom: 1rem; }
    .mission-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: .6rem; }
    .mission-card p  { font-size: .88rem; color: var(--clr-muted); }

    .team-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.5rem; }
    .team-card {
      background: var(--clr-surface); border: 1px solid var(--clr-border);
      border-radius: var(--radius-md); padding: 1.5rem; text-align: center;
      box-shadow: var(--shadow-sm); transition: transform var(--transition), box-shadow var(--transition);
    }
    .team-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .team-avatar {
      width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 1rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem; border: 3px solid var(--clr-border);
    }
    .team-name  { font-weight: 700; font-size: 1rem; margin-bottom: .2rem; }
    .team-role  { font-size: .8rem; color: var(--clr-primary); font-weight: 600; margin-bottom: .4rem; }
    .team-desc  { font-size: .8rem; color: var(--clr-muted); }

    .values-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.25rem; }
    .value-item {
      display: flex; gap: 1rem; align-items: flex-start;
      background: var(--clr-surface); border: 1px solid var(--clr-border);
      border-radius: var(--radius-md); padding: 1.5rem;
    }
    .value-icon { font-size: 1.8rem; flex-shrink: 0; }
    .value-item h4 { font-weight: 700; margin-bottom: .35rem; }
    .value-item p  { font-size: .86rem; color: var(--clr-muted); }

    .partner-row { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; align-items: center; }
    .partner-badge {
      background: var(--clr-surface); border: 1px solid var(--clr-border);
      border-radius: var(--radius-md); padding: .85rem 1.75rem;
      font-size: .88rem; font-weight: 600; color: var(--clr-muted);
      display: flex; align-items: center; gap: .6rem;
    }

    .timeline { position: relative; padding-left: 2rem; }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--clr-border); border-radius: 3px;
    }
    .tl-item { position: relative; margin-bottom: 2rem; }
    .tl-dot {
      position: absolute; left: -2.45rem; top: .25rem;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--clr-primary); border: 3px solid var(--clr-surface);
      box-shadow: 0 0 0 3px var(--clr-primary);
    }
    .tl-year { font-size: .78rem; font-weight: 700; color: var(--clr-primary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .25rem; }
    .tl-title { font-weight: 700; margin-bottom: .25rem; }
    .tl-desc { font-size: .86rem; color: var(--clr-muted); }

    @media(max-width:768px){
      .mission-grid { grid-template-columns: 1fr; }
      .team-grid    { grid-template-columns: repeat(2,1fr); }
      .values-grid  { grid-template-columns: 1fr; }
    }
    @media(max-width:480px){
      .team-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
