<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXORA — Aksesori Premium Pria & Wanita</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --gold: #C9A96E;
      --gold-light: #E8D5B0;
      --gold-dark: #9A7A45;
      --black: #0A0A0A;
      --dark: #111111;
      --dark2: #1A1A1A;
      --dark3: #222222;
      --white: #F8F4EE;
      --gray: #888888;
      --gray2: #555555;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
      cursor: none;
    }
    .cursor {
      width: 10px;
      height: 10px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
    }
    .cursor-follower {
      width: 36px;
      height: 36px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      position: fixed;
      z-index: 9998;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: all 0.15s ease;
      opacity: 0.6;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--dark);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold);
      border-radius: 2px;
    }
