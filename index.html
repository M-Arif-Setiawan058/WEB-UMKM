<!DOCTYPE html>
<html lang="id">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --gold: #C9A96E;
      --gold-light: #E8D5B0;
      --gold-dark: #9A7A45;
      --black: #0A0A0A;
      --dark: #111111;

      --white: #F8F4EE;
